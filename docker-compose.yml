services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: curly
      POSTGRES_USER: curly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-curly}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  jellyfin:
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    environment:
      JELLYFIN_PublishedServerUrl: ${APP_URL}
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ${MEDIA_ROOT:-/srv/curly/media}:/media
    ports:
      - "127.0.0.1:8096:8096"

  filebrowser:
    build:
      context: .
      dockerfile: ops/filebrowser/Dockerfile
    restart: unless-stopped
    environment:
      FILEBROWSER_BASEURL: ${FILEBROWSER_PROXY_PATH:-/api/files}
    volumes:
      - filebrowser_data:/database
      - ${MEDIA_ROOT:-/srv/curly/media}:/srv/media

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - postgres
      - jellyfin
      - filebrowser
    environment:
      NODE_ENV: production
      APP_NAME: ${APP_NAME:-Curly}
      APP_URL: ${APP_URL}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-curly_session}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-14}
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      JELLYFIN_INTERNAL_URL: ${JELLYFIN_INTERNAL_URL}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY}
      JELLYFIN_USER_ID: ${JELLYFIN_USER_ID}
      JELLYFIN_SERVER_NAME: ${JELLYFIN_SERVER_NAME:-Curly Media}
      FILEBROWSER_INTERNAL_URL: ${FILEBROWSER_INTERNAL_URL}
      FILEBROWSER_PROXY_PATH: ${FILEBROWSER_PROXY_PATH:-/api/files}
      MEDIA_ROOT: ${MEDIA_ROOT:-/srv/curly/media}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  jellyfin_config:
  jellyfin_cache:
  filebrowser_data:
